<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龚平安 | GONG Ping'an</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #fafafa;
            color: #1a1a1a;
            line-height: 1.8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        
        .name {
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
        }
        
        .divider {
            width: 60px;
            height: 2px;
            background: #1a1a1a;
            margin: 1.5rem auto;
        }
        
        .info {
            font-size: 1rem;
            color: #444;
            margin-bottom: 0.5rem;
        }
        
        .mbti {
            display: inline-block;
            margin-top: 1rem;
            padding: 0.3rem 1rem;
            border: 1px solid #1a1a1a;
            font-family: monospace;
            font-size: 0.9rem;
            letter-spacing: 0.2em;
        }
        
        .contact {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid #ddd;
        }
        
        .contact-title {
            font-size: 0.75rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            margin-bottom: 1.5rem;
        }
        
        .contact-item {
            margin: 0.8rem 0;
            font-size: 0.95rem;
            color: #333;
        }
        
        .contact-label {
            color: #888;
            margin-right: 0.5rem;
        }
        
        .footer {
            margin-top: 4rem;
            font-size: 0.75rem;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="name">龚平安</h1>
        <div class="divider"></div>
        <p class="info">长沙职业技术学院 · 软件学院</p>
        <p class="info">软件开发专业 · 软开2532</p>
        <span class="mbti">INTJ</span>
        
        <div class="contact">
            <p class="contact-title">Contact</p>
            <p class="contact-item">
                <span class="contact-label">微信</span>
                <span>imgodimright</span>
            </p>
            <p class="contact-item">
                <span class="contact-label">邮箱</span>
                <span>3524378598@qq.com</span>
            </p>
        </div>
        
        <div class="footer">
            © 2026 GONG Ping'an
        </div>
    </div>
</body>
</html>
